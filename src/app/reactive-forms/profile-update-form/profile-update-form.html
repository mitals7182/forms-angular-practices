<h2>Profile Form</h2>

<form [formGroup]="form" (ngSubmit)="submit()">

  <!-- Username -->
  <input formControlName="username" placeholder="Username" />
  <div class="error" *ngIf="form.get('username')?.invalid && form.get('username')?.touched">
    Username is required
  </div>

  <!-- Phone -->
  <input formControlName="phone" placeholder="Phone (10 digits)" />
  <div class="error" *ngIf="form.get('phone')?.invalid && form.get('phone')?.touched">
    Enter valid 10-digit phone number
  </div>

  <!-- Address -->
  <input formControlName="address" placeholder="Address" />
  <div class="error" *ngIf="form.get('address')?.invalid && form.get('address')?.touched">
    Address is required
  </div>

  <!-- Dropdown -->
  <select formControlName="profileType">
    <option value="basic">Basic</option>
    <option value="premium">Premium</option>
  </select>

  <button type="button" (click)="loadData()">Load Data</button>
  <button type="submit">Submit</button>

</form>

<h3>Output:</h3>
<pre>{{ data | json }}</pre>
